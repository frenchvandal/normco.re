name: Pretext Harness

on:
  workflow_call:
    inputs:
      runs-on:
        description: GitHub runner label used for the Pretext harness job.
        required: false
        type: string
        default: macos-26

permissions:
  contents: read

jobs:
  pretext-harness:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required for build-time per-file git metadata.
          fetch-depth: 0

      - name: Setup Deno environment
        uses: ./.github/actions/setup-deno

      - name: Verify frozen lockfiles
        run: deno task locks:check

      - name: Install Playwright Chromium for Pretext harness
        run: deno task --frozen pretext:harness:install

      - name: Run Pretext visual harness comparison
        run: deno task --frozen pretext:harness:compare:ci

      - name: Run Pretext React harness
        run: deno task --frozen pretext:react-harness:ci

      - name: Upload Pretext harness comparison artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: pretext-visual-harness-compare
          path: .tmp/pretext-harness-compare
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Pretext React harness artifact
        if: ${{ always() && hashFiles('.tmp/pretext-react-harness/**') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: pretext-react-harness
          path: .tmp/pretext-react-harness
          if-no-files-found: warn
          retention-days: 7
