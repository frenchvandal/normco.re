# Build and deploy static content to Alibaba Cloud OSS
name: Deploy static content to OSS

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "oss-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: development
    runs-on: macos-26
    env:
      OSS_BUCKET: ${{ vars.OSS_BUCKET }}
      OSS_REGION: ${{ vars.OSS_REGION }}
      OSS_CDN_BASE_URL: ${{ vars.OSS_CDN_BASE_URL }}
      LUME_LOGS: ${{ vars.LUME_LOGS }}
      OTEL_DENO: ${{ vars.OTEL_DENO }}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${{ vars.OTEL_EXPORTER_OTLP_PROTOCOL }}
      OTEL_LOG_LEVEL: ${{ vars.OTEL_LOG_LEVEL }}
      OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Deno environment
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true

      - name: Run build task
        shell: bash
        run: deno task build

      - name: Deploy to Alibaba Cloud OSS
        uses: frenchvandal/deploy-oss@master
        with:
          role-oidc-arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          oidc-provider-arn: ${{ secrets.ALIBABA_CLOUD_OIDC_PROVIDER_ARN }}
          role-session-name: ${{ github.run_id }}
          role-session-expiration: 3600
          input-dir: _site
          bucket: ${{ env.OSS_BUCKET }}
          region: ${{ env.OSS_REGION }}
          cdn-enabled: true
          cdn-base-url: ${{ env.OSS_CDN_BASE_URL }}
          cdn-actions: refresh,preload