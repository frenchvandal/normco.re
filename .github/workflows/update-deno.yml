name: Update Runtime Version

on:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: update-runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - id: versions
        name: Print runtime versions
        shell: bash
        run: |
          set -euo pipefail

          deno_output="$(deno -v)"
          printf '%s\n' "$deno_output"
          deno_version="$(printf '%s\n' "$deno_output" | sed -n '1s/^deno //p')"

          {
            echo "deno=$deno_version"
          } >> "$GITHUB_OUTPUT"

      - id: update_tool_versions
        name: Update .tool-versions
        shell: bash
        run: |
          set -euo pipefail

          current_deno="$(sed -n 's/^deno[[:space:]]\+\(.*\)$/\1/p' .tool-versions | head -n 1)"
          new_deno="${{ steps.versions.outputs.deno }}"

          changed=false

          if [[ "$current_deno" != "$new_deno" ]]; then
            changed=true

            awk \
              -v deno_version="$new_deno"  '
                BEGIN {
                  seen["deno"] = 0
                }
                $1 == "deno" {
                  print "deno " deno_version
                  seen["deno"] = 1
                  next
                }

                {
                  print
                }
                END {
                  if (!seen["deno"]) {
                    print "deno " deno_version
                  }
                }
              ' .tool-versions > .tool-versions.tmp

            mv .tool-versions.tmp .tool-versions
          fi

          {
            echo "changed=$changed"
            echo "current_deno=$current_deno"
            echo "new_deno=$new_deno"
          } >> "$GITHUB_OUTPUT"

      - name: Validate updated Deno runtime
        if: steps.update_tool_versions.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          deno task check
          deno task test
          deno task build

      - id: commit
        if: steps.update_tool_versions.outputs.changed == 'true'
        name: Commit and push .tool-versions
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .tool-versions
          git commit -m "chore: update deno version"
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase "origin/${GITHUB_REF_NAME}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Write runtime update summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Runtime Update Summary"
            echo
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Deno: \`${{ steps.update_tool_versions.outputs.current_deno }}\` -> \`${{ steps.update_tool_versions.outputs.new_deno }}\`"
            echo "- Updated .tool-versions: \`${{ steps.update_tool_versions.outputs.changed }}\`"
            echo "- Commit step: \`${{ steps.commit.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
