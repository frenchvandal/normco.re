# lefthook.yml — Git hook manager configuration.
#
# Installation via Deno (recommended — no Node.js required):
#   deno task lefthook:install
#
# Under the hood this runs: DENO_NO_PROMPT=1 deno x lefthook install
# DENO_NO_PROMPT=1 suppresses the interactive download confirmation so the
# command works in CI pipelines and non-interactive shells alike.
#
# Alternative installation methods:
#   brew install lefthook && lefthook install   # macOS via Homebrew
#   go install github.com/evilmartians/lefthook@latest && lefthook install  # via Go
#
# Reference: https://github.com/evilmartians/lefthook

pre-commit:
  # Independent tasks run in parallel for speed.
  parallel: true
  commands:
    fmt:
      name: deno fmt
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,scss,md}"
      run: deno fmt --check {staged_files}
    lint:
      name: deno lint
      glob: "*.{ts,tsx,js,jsx}"
      run: deno lint {staged_files}

commit-msg:
  commands:
    lint-commit:
      name: lint-commit
      # {1} is the path to the commit message file supplied by Git.
      run: deno task lint-commit {1}
